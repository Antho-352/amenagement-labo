<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E4D3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A96E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fond circulaire -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>

  <!-- Bécher de laboratoire stylisé -->
  <g transform="translate(50, 50)">
    <!-- Corps du bécher -->
    <path d="M -18 -20 L -18 5 Q -18 15, -10 18 L 10 18 Q 18 15, 18 5 L 18 -20 Z"
          fill="white" opacity="0.95"/>

    <!-- Liquide dans le bécher (gradient) -->
    <path d="M -16 0 L -16 5 Q -16 13, -9 15 L 9 15 Q 16 13, 16 5 L 16 0 Z"
          fill="#C9A96E" opacity="0.7"/>

    <!-- Graduation marks -->
    <line x1="-18" y1="-5" x2="-14" y2="-5" stroke="#1E4D3A" stroke-width="1"/>
    <line x1="-18" y1="5" x2="-14" y2="5" stroke="#1E4D3A" stroke-width="1"/>

    <!-- Bec verseur -->
    <path d="M 18 -10 L 22 -8" stroke="white" stroke-width="2" fill="none" opacity="0.95"/>

    <!-- Éprouvette à côté -->
    <rect x="-5" y="-25" width="3" height="20" fill="white" opacity="0.8" rx="1"/>
    <rect x="-5" y="-15" width="3" height="8" fill="#1E4D3A" opacity="0.5"/>
  </g>
</svg>
